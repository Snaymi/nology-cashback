<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Cashback</title>
  <link rel="icon" type="image/png" href="/static/favicon.png" />

  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Calculadora de Cashback</h1>
      <p>
        Informe os dados da compra para calcular o cashback conforme as regras do programa.
      </p>

      <form id="cashbackForm">
        <label for="tipoCliente">Tipo de cliente</label>
        <select id="tipoCliente" required>
          <option value="comum">Comum</option>
          <option value="vip">VIP</option>
        </select>

        <label for="valorProduto">Valor do produto</label>
        <input
          type="number"
          id="valorProduto"
          placeholder="Ex: 600"
          min="0.01"
          step="0.01"
          required
        />

        <label for="percentualDesconto">Desconto (%)</label>
        <input
          type="number"
          id="percentualDesconto"
          placeholder="Ex: 15"
          min="0"
          max="100"
          step="0.01"
          value="0"
          required
        />

        <button type="submit">Calcular cashback</button>
      </form>

      <div id="resultado" class="resultado escondido"></div>
    </section>

    <section class="card">
      <h2>Meu histórico de consultas</h2>
      <p>O histórico abaixo mostra apenas as consultas registradas para o seu IP.</p>

      <div id="historico" class="historico"></div>
    </section>
  </main>

  <script src="/static/script.js"></script>
</body>
</html>
